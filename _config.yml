future: true

title: Text to Speech
description: "Turn text into natural-sounding speech in seconds. Import PDFs, docs, and photos, then listen anywhere on iPhone and iPad."
url: "https://text2speech.co"
baseurl: ""

app_store_url: "https://apps.apple.com/us/app/id739280962"

author:
  name: Text to Speech Team

social:
  name: Text to Speech

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

permalink: /blog/:year/:month/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Text to Speech Team"

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - README.md
  - vendor/
